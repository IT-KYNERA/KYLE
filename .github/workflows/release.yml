name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 18
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
          HOMEBREW_NO_INSTALL_CLEANUP: 1
        run: |
          brew install llvm@18 2>&1
          brew link --overwrite llvm@18 2>&1 || true
          echo "LLVM_SYS_181_PREFIX=$(brew --prefix llvm@18)" >> $GITHUB_ENV

      - name: Verify LLVM
        run: |
          echo "LLVM_SYS_181_PREFIX=$LLVM_SYS_181_PREFIX"
          "$LLVM_SYS_181_PREFIX/bin/llvm-config" --version

      - name: Build klc (release)
        run: |
          cargo build --bin klc --release \
            --config 'env.LLVM_SYS_181_PREFIX=""'

      - name: Build runtime static library
        run: cargo build -p klc_runtime --release

      - name: Package tarball
        run: |
          mkdir -p dist/klc/lib
          cp target/release/klc dist/klc/
          cp target/release/libklc_runtime.a dist/klc/lib/
          cp install.sh uninstall.sh dist/klc/
          chmod +x dist/klc/install.sh dist/klc/uninstall.sh
          cd dist
          tar czf klc-${{ github.ref_name }}-macos-arm64.tar.gz klc/

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            dist/klc-*.tar.gz \
            --title "klc ${{ github.ref_name }}" \
            --notes "See commit history for changes."
