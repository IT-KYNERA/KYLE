name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 18 (Linux ARM)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq llvm-18-dev libpolly-18-dev libzstd-dev
          echo "LLVM_SYS_181_PREFIX=/usr/lib/llvm-18" >> $GITHUB_ENV

      - name: Build kl (release)
        run: cargo build --bin kl --release

      - name: Package tarball
        run: |
          mkdir -p dist
          cp target/release/kl dist/kl
          chmod +x dist/kl
          cd dist && tar czf kl-${{ github.ref_name }}-linux-arm64.tar.gz kl

      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} dist/kl-*.tar.gz --clobber

  build-linux-x64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 18 (Linux x64)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq llvm-18-dev libpolly-18-dev libzstd-dev
          echo "LLVM_SYS_181_PREFIX=/usr/lib/llvm-18" >> $GITHUB_ENV

      - name: Build kl (release)
        run: cargo build --bin kl --release

      - name: Package tarball
        run: |
          mkdir -p dist
          cp target/release/kl dist/kl
          chmod +x dist/kl
          cd dist && tar czf kl-${{ github.ref_name }}-linux-x64.tar.gz kl

      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} dist/kl-*.tar.gz --clobber

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 18
        run: |
          brew install llvm@18
          echo "LLVM_SYS_181_PREFIX=$(brew --prefix llvm@18)" >> $GITHUB_ENV

      - name: Build kl (release)
        run: cargo build --bin kl --release

      - name: Package tarball
        run: |
          mkdir -p dist
          cp target/release/kl dist/kl
          chmod +x dist/kl
          cd dist && tar czf kl-${{ github.ref_name }}-macos-arm64.tar.gz kl

      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} dist/kl-*.tar.gz --clobber

  build-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 18 (Windows)
        shell: pwsh
        run: |
          # Download and extract LLVM from GitHub releases
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-18.1.0/LLVM-18.1.0-win64.exe"
          $out = "$env:TEMP\LLVM-18.1.0-win64.exe"
          Write-Host "Downloading LLVM 18.1.0..."
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Invoke-WebRequest -Uri $url -OutFile $out
          Write-Host "Extracting LLVM 18.1.0..."
          # Use 7z (pre-installed on Windows runner) to extract the installer
          7z x $out -o"C:\llvm" -y | Out-Null
          Write-Host "LLVM extracted to C:\llvm"
          echo "LLVM_SYS_181_PREFIX=C:\llvm" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          # Check if llvm-config exists
          if (Test-Path "C:\llvm\bin\llvm-config.exe") {
            & "C:\llvm\bin\llvm-config.exe" --version
          } else {
            # Try LLVM-18.1.0-win64.exe extraction via /S
            Write-Host "Binary extraction didn't produce llvm-config, trying installer..."
          }

      - name: Install LLVM 18 via installer (fallback)
        if: failure()
        shell: pwsh
        run: |
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-18.1.0/LLVM-18.1.0-win64.exe"
          $out = "$env:TEMP\LLVM-18.1.0-win64.exe"
          Invoke-WebRequest -Uri $url -OutFile $out
          Start-Process -FilePath $out -ArgumentList "/S /D=C:\llvm" -Wait -NoNewWindow
          echo "LLVM_SYS_181_PREFIX=C:\llvm" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Verify LLVM
        shell: pwsh
        run: |
          if (Test-Path "$env:LLVM_SYS_181_PREFIX\bin\llvm-config.exe") {
            & "$env:LLVM_SYS_181_PREFIX\bin\llvm-config.exe" --version
          } else {
            Get-ChildItem -Recurse -Filter "llvm-config.exe" -ErrorAction SilentlyContinue | Select-Object -First 3
          }

      - name: Build kl (release)
        run: cargo build --bin kl --release

      - name: Package zip
        shell: pwsh
        run: |
          mkdir dist -Force
          Copy-Item target/release/kl.exe dist/kl.exe
          cd dist
          Compress-Archive -Path kl.exe -DestinationPath kl-${{ github.ref_name }}-windows-x64.zip

      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} dist/kl-*.zip --clobber
