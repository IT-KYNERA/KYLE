name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 18 (Linux ARM)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq llvm-18-dev libpolly-18-dev libzstd-dev
          echo "LLVM_SYS_181_PREFIX=/usr/lib/llvm-18" >> $GITHUB_ENV

      - name: Build kl (release)
        run: cargo build --bin kl --release

      - name: Package tarball
        run: |
          mkdir -p dist
          cp target/release/kl dist/kl
          chmod +x dist/kl
          cd dist && tar czf kl-${{ github.ref_name }}-linux-arm64.tar.gz kl

      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} dist/kl-*.tar.gz --clobber

  build-linux-x64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 18 (Linux x64)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq llvm-18-dev libpolly-18-dev libzstd-dev
          echo "LLVM_SYS_181_PREFIX=/usr/lib/llvm-18" >> $GITHUB_ENV

      - name: Build kl (release)
        run: cargo build --bin kl --release

      - name: Package tarball
        run: |
          mkdir -p dist
          cp target/release/kl dist/kl
          chmod +x dist/kl
          cd dist && tar czf kl-${{ github.ref_name }}-linux-x64.tar.gz kl

      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} dist/kl-*.tar.gz --clobber

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 18
        run: |
          brew install llvm@18
          echo "LLVM_SYS_181_PREFIX=$(brew --prefix llvm@18)" >> $GITHUB_ENV

      - name: Build kl (release)
        run: cargo build --bin kl --release

      - name: Package tarball
        run: |
          mkdir -p dist
          cp target/release/kl dist/kl
          chmod +x dist/kl
          cd dist && tar czf kl-${{ github.ref_name }}-macos-arm64.tar.gz kl

      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} dist/kl-*.tar.gz --clobber

  build-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 18 (Windows)
        shell: pwsh
        run: |
          # Try choco first (fastest)
          choco install llvm -y --no-progress 2>&1
          $found = Get-ChildItem -Recurse -Filter "llvm-config.exe" -ErrorAction SilentlyContinue `
            | Select-Object -First 1
          if ($found) {
            $dir = $found.Directory.Parent.FullName
            echo "LLVM_SYS_181_PREFIX=$dir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            Write-Host "LLVM found at: $dir via choco"
            return
          }
          # Fallback: download from GitHub
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-18.1.0/LLVM-18.1.0-win64.exe"
          $out = "$env:TEMP\LLVM-18.1.0-win64.exe"
          Write-Host "Downloading LLVM 18.1.0..."
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Invoke-WebRequest -Uri $url -OutFile $out
          Write-Host "Installing LLVM 18.1.0 silently..."
          Start-Process -FilePath $out -ArgumentList "/S" -Wait -NoNewWindow
          $fallbackPaths = @(
            "C:\Program Files\LLVM",
            "${env:ProgramFiles}\LLVM",
            "${env:LOCALAPPDATA}\Programs\LLVM"
          )
          $llvmDir = $null
          foreach ($p in $fallbackPaths) {
            if (Test-Path "$p\bin\llvm-config.exe") { $llvmDir = $p; break }
          }
          if (-not $llvmDir) {
            # Search whole system
            $exe = Get-ChildItem -Recurse -Filter "llvm-config.exe" -ErrorAction SilentlyContinue `
              | Select-Object -First 1
            if ($exe) { $llvmDir = $exe.Directory.Parent.FullName }
          }
          if ($llvmDir) {
            echo "LLVM_SYS_181_PREFIX=$llvmDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            Write-Host "LLVM installed to: $llvmDir"
            & "$llvmDir\bin\llvm-config.exe" --version
          } else {
            throw "Could not find LLVM 18 installation"
          }

      - name: Build kl (release)
        run: cargo build --bin kl --release

      - name: Package zip
        shell: pwsh
        run: |
          mkdir dist -Force
          Copy-Item target/release/kl.exe dist/kl.exe
          cd dist
          Compress-Archive -Path kl.exe -DestinationPath kl-${{ github.ref_name }}-windows-x64.zip

      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} dist/kl-*.zip --clobber
