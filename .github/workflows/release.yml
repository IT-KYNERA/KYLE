name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 18
        run: |
          brew install llvm@18
          echo "LLVM_SYS_181_PREFIX=$(brew --prefix llvm@18)" >> $GITHUB_ENV

      - name: Build klc (release)
        run: cargo build --bin klc --release

      - name: Build runtime static library
        run: cargo build -p klc_runtime --release

      - name: Package tarball
        run: |
          mkdir -p dist/klc/lib
          cp target/release/klc dist/klc/
          cp target/release/libklc_runtime.a dist/klc/lib/
          cp install.sh uninstall.sh dist/klc/
          cd dist
          tar czf klc-${{ github.ref_name }}-macos-arm64.tar.gz klc/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/klc-*.tar.gz
          generate_release_notes: true
