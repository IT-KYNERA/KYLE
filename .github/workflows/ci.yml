name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04-arm
          - ubuntu-24.04
          - macos-15

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install LLVM 18 (Linux ARM)
        if: runner.os == 'Linux' && runner.arch == 'ARM64'
        run: |
          sudo apt-get update
          sudo apt-get install -y wget lsb-release software-properties-common gnupg pkg-config
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/llvm.asc
          sudo add-apt-repository -y "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-18 main"
          sudo apt-get update
          sudo apt-get install -y llvm-18-dev libpolly-18-dev libzstd-dev 2>/dev/null || \
            sudo apt-get install -y llvm-18-dev libzstd-dev
          echo "LLVM_SYS_181_PREFIX=/usr/lib/llvm-18" >> $GITHUB_ENV

      - name: Install LLVM 18 (Linux x64)
        if: runner.os == 'Linux' && runner.arch == 'X64'
        run: |
          sudo apt-get update
          sudo apt-get install -y wget lsb-release software-properties-common gnupg pkg-config
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/llvm.asc
          sudo add-apt-repository -y "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-18 main"
          sudo apt-get update
          sudo apt-get install -y llvm-18-dev libpolly-18-dev libzstd-dev 2>/dev/null || \
            sudo apt-get install -y llvm-18-dev libzstd-dev
          echo "LLVM_SYS_181_PREFIX=/usr/lib/llvm-18" >> $GITHUB_ENV

      - name: Install LLVM 18 (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@18
          LLVM_PREFIX=$(brew --prefix llvm@18)
          echo "LLVM_SYS_181_PREFIX=$LLVM_PREFIX" >> $GITHUB_ENV
          echo "$LLVM_PREFIX/bin" >> $GITHUB_PATH

      - name: Verify LLVM
        run: |
          if command -v llvm-config-18 &>/dev/null; then
            llvm-config-18 --version
          elif [ -n "$LLVM_SYS_181_PREFIX" ]; then
            $LLVM_SYS_181_PREFIX/bin/llvm-config --version
          else
            echo "LLVM not found!"
            exit 1
          fi

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (workspace)
        run: cargo build --workspace

      - name: Run tests
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings 2>&1 || true

      - name: Build release binary
        run: cargo build --release --bin kl

      - name: Verify binary
        run: |
          ./target/release/kl --version
          ./target/release/kl help

  vscode:
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: vscode-kl
        run: npm install

      - name: TypeScript check
        working-directory: vscode-kl
        run: npx -p typescript tsc --noEmit

      - name: Package VSIX
        working-directory: vscode-kl
        run: npx @vscode/vsce package --out kl-${{ github.sha }}.vsix

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: kl-vscode-extension
          path: vscode-kl/*.vsix
          retention-days: 30
