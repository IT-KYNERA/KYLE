name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 18
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq llvm-18-dev libclang-18-dev libpolly-18-dev libzstd-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build workspace
        run: cargo build --workspace

      - name: Run unit tests
        run: |
          cargo test -p klc_core -p klc_frontend -p klc_semantic -p klc_mir -p klc_runtime -p klc_tools

      - name: Verify examples compile and run
        run: |
          for f in examples/*.kl; do
            echo "=== $(basename $f) ==="
            cargo run --bin klc -- run "$f"
          done

      - name: Verify formatter
        run: |
          cargo run --bin klc -- fmt examples/hello.kl
