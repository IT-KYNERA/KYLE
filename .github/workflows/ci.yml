name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 18
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq llvm-18-dev libclang-18-dev libpolly-18-dev libzstd-dev
          echo "LLVM_SYS_181_PREFIX=/usr/lib/llvm-18" >> $GITHUB_ENV

      - name: Build workspace
        run: cargo build --workspace

      - name: Run unit tests
        run: cargo test -p klc_core -p klc_frontend -p klc_semantic -p klc_mir -p klc_runtime -p klc_tools -p klc_driver

      - name: Build and run comprehensive test
        run: |
          cd examples
          cargo run --bin kl -- build --release
          ./target/release/main
