# KL Compiler — LLVM Configuration
#
# inkwell 0.9 requires LLVM 18.1. Set LLVM_SYS_181_PREFIX to point at it.
#
# Cargo's [env] table is static (cannot auto-detect per-OS), so each platform
# must export the env var manually. CI sets it per-platform in the workflow.
#
# Setup:
#   Linux (Ubuntu/Debian):  apt install llvm-18-dev
#       → export LLVM_SYS_181_PREFIX=/usr/lib/llvm-18
#   macOS (Homebrew Apple Silicon):  brew install llvm@18
#       → export LLVM_SYS_181_PREFIX=$(brew --prefix llvm@18)
#   Windows:
#       → $env:LLVM_SYS_181_PREFIX = "C:\path\to\llvm-18"
#
# To make the setting permanent, add the export line to your shell profile
# (~/.bashrc, ~/.zshrc, $PROFILE) or use `direnv` with .envrc.
