# KL Compiler — LLVM Configuration
#
# Linux (Ubuntu Noble): system LLVM 18 via apt (llvm-18-dev)
# llvm-config path: /usr/bin/llvm-config (symlink to /usr/lib/llvm-18/bin/llvm-config)

[env]
# macOS (Homebrew): brew install llvm@18 → /opt/homebrew/opt/llvm@18
# Linux (Ubuntu Noble): apt install llvm-18-dev → /usr/lib/llvm-18
LLVM_SYS_181_PREFIX = "/opt/homebrew/opt/llvm@18"
